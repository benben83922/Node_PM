version: '3.8'

services:
  # -----------------------------------------------------------------
  # A 容器：Discord Bot (自動從 Docker Hub 拉取)
  # -----------------------------------------------------------------
  discord-agent:
    image: ${DISCORD_BOT_IMAGE}
    container_name: discord-agent
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # 讓容器可穿透回 WSL 宿主機
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # 讓容器可呼叫宿主機的 docker exec
    environment:
      - DISCORD_TOKEN=${DISCORD_BOT_TOKEN}
      - NEMOCLAW_CONTAINER=${NEMOCLAW_CONTAINER:-openshell-cluster-nemoclaw}
      - LOG_LEVEL=${LOG_LEVEL}

